<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXUS ERP — Power BI × AI Intelligence</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>

  <style>
    :root {
      --bg: #060A12;
      --card: #0C1422;
      --card-alt: #111B2D;
      --border: #1A2B40;
      --accent: #00D4FF;
      --accent-glow: rgba(0, 212, 255, 0.3);
      --accent2: #7C3AED;
      --text: #E2EBF6;
      --muted: #4A6585;
      --success: #10B981;
      --danger: #EF4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'DM Sans', sans-serif; 
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .app-shell { max-width: 1400px; margin: 0 auto; padding: 0 24px; }
    .top-nav {
      height: 70px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      margin-bottom: 30px;
      position: sticky;
      top: 0;
      background: rgba(6, 10, 18, 0.8);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    /* ── UI Components ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      transition: all 0.3s ease;
    }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .kpi-tile {
      padding: 24px;
      border-left: 4px solid var(--accent);
      background: var(--card-alt);
    }
    .kpi-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .kpi-value { font-size: 28px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
    
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid var(--border);
      font-family: inherit;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary { background: var(--accent); color: #000; border: none; }
    .btn-primary:hover { box-shadow: 0 0 20px var(--accent-glow); transform: translateY(-1px); }
    .btn-outline { background: transparent; color: var(--text); }
    .btn-outline:hover { background: var(--border); }

    .input-field {
      width: 100%;
      background: #08101C;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      resize: vertical;
      min-height: 200px;
    }

    /* ── Animation ── */
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-up { animation: slideUp 0.5s ease forwards; }

    /* ── Loading Overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .loader {
      width: 48px;
      height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useRef, useMemo } = React;
  
  // ── RECHARTS MAPPING ──
  const { 
    AreaChart, Area, BarChart, Bar, XAxis, YAxis, 
    CartesianGrid, Tooltip, ResponsiveContainer, Cell, PieChart, Pie 
  } = window.Recharts;

  function App() {
    const [view, setView] = useState('input');
    const [apiKey, setApiKey] = useState('');
    const [dataContent, setDataContent] = useState('');
    const [loading, setLoading] = useState(false);
    const [step, setStep] = useState('');
    const [dashboard, setDashboard] = useState(null);
    const [error, setError] = useState(null);

    // ── RAG LOGIC: DATA INGESTION ──
    const handleFile = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      setStep('Ingesting file...');
      const reader = new FileReader();

      if (file.name.endsWith('.pdf')) {
        const PDFJS_VER = '3.11.174';
        setStep('Loading PDF Engine...');
        await new Promise(res => {
          const s = document.createElement('script');
          s.src = `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${PDFJS_VER}/pdf.min.js`;
          s.onload = res; document.head.appendChild(s);
        });
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${PDFJS_VER}/pdf.worker.min.js`;
        
        reader.onload = async () => {
          const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(reader.result) }).promise;
          let text = "";
          for (let i = 1; i <= Math.min(pdf.numPages, 10); i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            text += content.items.map(s => s.str).join(" ") + "\n";
          }
          setDataContent(text);
          setStep('PDF parsed successfully.');
        };
        reader.readAsArrayBuffer(file);
      } else {
        reader.onload = (e) => {
          const wb = XLSX.read(e.target.result, { type: 'binary' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          setDataContent(XLSX.utils.sheet_to_csv(ws));
          setStep('Excel parsed successfully.');
        };
        reader.readAsBinaryString(file);
      }
    };

    // ── RAG LOGIC: DUAL-PASS ANALYSIS ──
    const generateIntelligence = async () => {
      if (!apiKey) return alert("Please enter your Anthropic API Key.");
      setLoading(true);
      setError(null);

      try {
        // PASS 1: Structural Extraction
        setStep('Pass 1: Identifying KPI structures...');
        const extractRes = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": apiKey,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
          },
          body: JSON.stringify({
            model: "claude-3-5-sonnet-20241022",
            max_tokens: 3000,
            system: "You are a senior ERP analyst. Output ONLY raw JSON.",
            messages: [{ role: "user", content: `Convert this data into a JSON object with: 
              { "title": "Dashboard Title", 
                "kpis": [{"label": "Metric", "value": "Val", "trend": "up|down", "change": "+X%"}], 
                "charts": [{"type": "bar|area", "title": "Chart Title", "data": [{"name": "Label", "value": 100}]}] 
              }. DATA: ${dataContent.slice(0, 5000)}` }]
          })
        });

        const rawData = await extractRes.json();
        const contentStr = rawData.content[0].text;
        const start = contentStr.indexOf('{');
        const end = contentStr.lastIndexOf('}');
        const jsonBody = JSON.parse(contentStr.substring(start, end + 1));

        // PASS 2: Strategic Narrative
        setStep('Pass 2: Synthesizing board narrative...');
        const narrRes = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": apiKey,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
          },
          body: JSON.stringify({
            model: "claude-3-5-sonnet-20241022",
            max_tokens: 1500,
            messages: [{ role: "user", content: `As a CFO, write a high-level 3-paragraph board summary about these results: ${JSON.stringify(jsonBody)}` }]
          })
        });

        const narrData = await narrRes.json();
        setDashboard({ ...jsonBody, narrative: narrData.content[0].text });
        setView('dashboard');
      } catch (err) {
        setError("AI Synthesis failed. Please check your data or API Key.");
      } finally {
        setLoading(false);
      }
    };

    // ── EXPORT ENGINES ──
    const exportToPDF = () => {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(22);
      doc.setTextColor(0, 212, 255);
      doc.text(dashboard.title, 15, 20);
      doc.setFontSize(10);
      doc.setTextColor(100);
      doc.text(`Generated on ${new Date().toLocaleDateString()}`, 15, 28);
      
      doc.setFontSize(14);
      doc.setTextColor(0);
      doc.text("Executive Narrative", 15, 45);
      doc.setFontSize(11);
      doc.text(dashboard.narrative, 15, 55, { maxWidth: 180 });
      
      doc.save(`${dashboard.title.replace(/\s+/g, '_')}.pdf`);
    };

    const exportToPPTX = () => {
      let pptx = new PptxGenJS();
      let slide = pptx.addSlide();
      slide.background = { color: '060A12' };
      slide.addText(dashboard.title, { x: 0.5, y: 0.5, fontSize: 32, color: '00D4FF', bold: true });
      slide.addText(dashboard.narrative, { x: 0.5, y: 1.5, fontSize: 14, color: 'E2EBF6', w: 9 });
      pptx.writeFile({ fileName: "NEXUS_Board_Report.pptx" });
    };

    return (
      <div className="app-shell">
        {loading && (
          <div className="overlay">
            <div className="loader"></div>
            <p style={{marginTop: '20px', fontWeight: 'bold'}}>{step}</p>
          </div>
        )}

        <nav className="top-nav">
          <div style={{display: 'flex', alignItems: 'center', gap: '12px'}}>
            <div style={{width: 32, height: 32, background: 'var(--accent)', borderRadius: '6px', display: 'flex', justifyContent: 'center', alignItems: 'center', color: '#000', fontWeight: 'bold'}}>N</div>
            <h2 style={{letterSpacing: '-1px'}}>NEXUS <span style={{color: 'var(--accent)'}}>ERP</span></h2>
          </div>
          <div style={{display: 'flex', gap: '12px'}}>
            <input 
              type="password" 
              placeholder="Anthropic API Key" 
              className="btn btn-outline" 
              style={{cursor: 'text', fontSize: '12px', width: '220px'}} 
              value={apiKey} 
              onChange={(e) => setApiKey(e.target.value)} 
            />
            {view === 'dashboard' && <button className="btn btn-outline" onClick={() => setView('input')}>New Project</button>}
          </div>
        </nav>

        {view === 'input' ? (
          <div className="animate-up">
            <div className="card" style={{maxWidth: '800px', margin: '0 auto', textAlign: 'center'}}>
              <h1 style={{fontSize: '36px', marginBottom: '12px'}}>Intelligence Engine</h1>
              <p style={{color: 'var(--muted)', marginBottom: '32px'}}>Input your financial data, reports, or CSV logs. Our RAG pipeline identifies KPIs and generates board-level insights.</p>
              
              <div style={{marginBottom: '24px'}}>
                <input type="file" id="fileIn" hidden onChange={handleFile} />
                <label htmlFor="fileIn" className="btn btn-outline" style={{width: '100%', padding: '40px', borderStyle: 'dashed', justifyContent: 'center'}}>
                   Click to upload Excel, CSV, or PDF
                </label>
                {step && <p style={{fontSize: '12px', marginTop: '10px', color: 'var(--success)'}}>{step}</p>}
              </div>

              <textarea 
                className="input-field" 
                placeholder="Or paste raw text/numbers here..." 
                value={dataContent}
                onChange={(e) => setDataContent(e.target.value)}
              />

              {error && <p style={{color: 'var(--danger)', margin: '16px 0'}}>{error}</p>}

              <button className="btn btn-primary" style={{width: '100%', marginTop: '24px', padding: '16px'}} onClick={generateIntelligence}>
                ⚡ ANALYZE DATA & GENERATE DASHBOARD
              </button>
            </div>
          </div>
        ) : (
          <div className="animate-up">
            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: '30px'}}>
              <div>
                <span className="badge">AI ANALYSIS COMPLETE</span>
                <h1 style={{fontSize: '32px'}}>{dashboard.title}</h1>
              </div>
              <div style={{display: 'flex', gap: '12px'}}>
                <button className="btn btn-outline" onClick={exportToPDF}>Download PDF</button>
                <button className="btn btn-outline" onClick={exportToPPTX}>Export PPTX</button>
              </div>
            </div>

            <div className="kpi-grid">
              {dashboard.kpis.map((k, i) => (
                <div key={i} className="card kpi-tile" style={{borderLeftColor: i % 2 === 0 ? 'var(--accent)' : 'var(--accent2)'}}>
                  <div className="kpi-label">{k.label}</div>
                  <div className="kpi-value">{k.value}</div>
                  <div style={{fontSize: '13px', fontWeight: 'bold', color: k.trend === 'up' ? 'var(--success)' : 'var(--danger)', marginTop: '4px'}}>
                    {k.trend === 'up' ? '▲' : '▼'} {k.change}
                  </div>
                </div>
              ))}
            </div>

            <div style={{display: 'grid', gridTemplateColumns: '1.5fr 1fr', gap: '24px'}}>
              <div className="card">
                <h3 style={{marginBottom: '20px'}}>Trend Analysis</h3>
                <div style={{height: '350px'}}>
                  <ResponsiveContainer width="100%" height="100%">
                    <AreaChart data={dashboard.charts[0].data}>
                      <defs>
                        <linearGradient id="colorVal" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="5%" stopColor="var(--accent)" stopOpacity={0.3}/>
                          <stop offset="95%" stopColor="var(--accent)" stopOpacity={0}/>
                        </linearGradient>
                      </defs>
                      <CartesianGrid strokeDasharray="3 3" stroke="#1A2B40" vertical={false} />
                      <XAxis dataKey="name" stroke="var(--muted)" fontSize={11} tickLine={false} axisLine={false} />
                      <YAxis stroke="var(--muted)" fontSize={11} tickLine={false} axisLine={false} />
                      <Tooltip contentStyle={{background: '#0C1422', border: '1px solid #1A2B40', borderRadius: '8px'}} />
                      <Area type="monotone" dataKey="value" stroke="var(--accent)" fillOpacity={1} fill="url(#colorVal)" strokeWidth={3} />
                    </AreaChart>
                  </ResponsiveContainer>
                </div>
              </div>
              <div className="card">
                <h3 style={{marginBottom: '20px'}}>CFO Executive Narrative</h3>
                <div style={{padding: '20px', background: 'rgba(255,255,255,0.03)', borderRadius: '12px', color: '#A0AFC0', fontSize: '15px', lineHeight: '1.8', whiteSpace: 'pre-wrap'}}>
                  {dashboard.narrative}
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
</script>

</body>
</html>
