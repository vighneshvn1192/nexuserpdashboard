// ── Script loader & Parsers ──────────────────────────────────────────────────
function loadScript(src) {
  return new Promise((res, rej) => {
    if (document.querySelector(`script[src="${src}"]`)) return res();
    const s = document.createElement("script");
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

/* FIX: Matching Versions & Proper Worker Path for PDF.js */
async function parsePDF(file) {
  const PDFJS_VER = '3.11.174';
  await loadScript(`https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${PDFJS_VER}/pdf.min.js`);
  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  pdfjsLib.GlobalWorkerOptions.workerSrc = `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${PDFJS_VER}/pdf.worker.min.js`;

  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  let text = "";
  for (let i = 1; i <= Math.min(pdf.numPages, 20); i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(s => s.str).join(" ") + "\n";
  }
  return { text: text.slice(0, 8000), pages: pdf.numPages, fileName: file.name };
}

function parseExcelFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type:"array", cellDates:true });
        const sheets = {};
        let totalRows = 0;
        wb.SheetNames.forEach(name => {
          const ws = wb.Sheets[name];
          const raw = XLSX.utils.sheet_to_json(ws, { header:1, defval:"" });
          sheets[name] = { raw, rowCount: raw.length };
          totalRows += raw.length;
        });
        resolve({ sheets, sheetNames: wb.SheetNames, totalRows, fileName: file.name });
      } catch(err){ reject(err); }
    };
    reader.readAsArrayBuffer(file);
  });
}

function sheetToText(sheetData, maxRows = 35) {
  let out = "";
  sheetData.raw.slice(0, maxRows).forEach((row, i) => {
    const line = row.filter(c => c !== "" && c != null).join(" | ");
    if (line.trim()) out += `R${i+1}: ${line}\n`;
  });
  return out;
}

// ── Claude API CALL ──────────────────────────────────────────────────────────
async function callClaude(system, user, maxTokens = 5000, apiKey = "") {
  if (!apiKey) throw new Error("Please enter an Anthropic API Key (top right).");
  
  const headers = {
    "Content-Type": "application/json",
    "anthropic-version": "2023-06-01",
    "x-api-key": apiKey,
    "anthropic-dangerous-direct-browser-access": "true" 
  };
  
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers,
    body: JSON.stringify({
      model: "claude-3-5-sonnet-20241022",
      max_tokens: maxTokens,
      system,
      messages: [{ role:"user", content: user }],
    }),
  });
  
  if (!res.ok) {
    const d = await res.json();
    throw new Error(d.error?.message || `API error ${res.status}`);
  }
  const d = await res.json();
  return d.content?.[0]?.text ?? "";
}

// ── Gauge SVG ─────────────────────────────────────────────────────────────────
function GaugeChart({ value, max=100, color=T.accent, label="" }) {
  const pct = Math.min(1, Math.max(0, value / max));
  const r=70, cx=90, cy=90;
  const toXY = (a, rad) => {
    const r2 = (a * Math.PI) / 180;
    return [cx + rad * Math.cos(r2), cy + rad * Math.sin(r2)];
  };
  const arcPath = (a1, a2, rad) => {
    const [x1,y1] = toXY(a1, rad);
    const [x2,y2] = toXY(a2, rad);
    const large = Math.abs(a2-a1) > 180 ? 1 : 0;
    return `M ${x1} ${y1} A ${rad} ${rad} 0 ${large} 1 ${x2} ${y2}`;
  };
  const startAngle=-210, sweep=240;
  const endAngle = startAngle + sweep * pct;
  return (
    <svg viewBox="0 0 180 130" style={{width:"100%",maxWidth:180}}>
      <path d={arcPath(startAngle, startAngle+sweep, r)} fill="none" stroke={T.border} strokeWidth={12} strokeLinecap="round"/>
      <path d={arcPath(startAngle, endAngle, r)} fill="none" stroke={color} strokeWidth={12} strokeLinecap="round"/>
      <text x={cx} y={cy-2} textAnchor="middle" fill={T.text} fontSize="22" fontWeight="800" fontFamily="JetBrains Mono">{Math.round(pct*100)}%</text>
      <text x={cx} y={cy+18} textAnchor="middle" fill={T.muted} fontSize="9">{label}</text>
    </svg>
  );
}

// ── Chart Renderer ─────────────────────────────────────────────────────────────
function ChartRenderer({ chart, height=255, color }) {
  const data = chart?.data ?? [];
  const type = chart?.type ?? "bar";
  const cc = color || T.accent;

  if (!data.length) return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:T.muted}}>No data</div>;

  if (type === "gauge") {
    return (
      <div style={{height,display:"flex",flexWrap:"wrap",alignItems:"center",justifyContent:"center",gap:10}}>
        {data.slice(0,4).map((d2,i)=>(<GaugeChart key={i} value={Number(d2.value)||0} max={100} color={T.colors[i%T.colors.length]} label={d2.name}/>))}
      </div>
    );
  }

  // Simplified chart mapping logic
  return (
    <ResponsiveContainer width="100%" height={height}>
      {type === "area" ? (
        <AreaChart data={data}>
          <CartesianGrid strokeDasharray="3 3" stroke={T.border} vertical={false}/>
          <XAxis dataKey="name" tick={{fill:T.muted,fontSize:10}} axisLine={false}/>
          <YAxis tick={{fill:T.muted,fontSize:10}} axisLine={false}/>
          <Tooltip contentStyle={{background:T.card,border:`1px solid ${T.border}`}}/>
          <Area type="monotone" dataKey="value" stroke={cc} fill={cc} fillOpacity={0.2} strokeWidth={2}/>
        </AreaChart>
      ) : (
        <BarChart data={data}>
          <CartesianGrid strokeDasharray="3 3" stroke={T.border} vertical={false}/>
          <XAxis dataKey="name" tick={{fill:T.muted,fontSize:10}} axisLine={false}/>
          <YAxis tick={{fill:T.muted,fontSize:10}} axisLine={false}/>
          <Tooltip contentStyle={{background:T.card,border:`1px solid ${T.border}`}}/>
          <Bar dataKey="value" fill={cc} radius={[4,4,0,0]}/>
        </BarChart>
      )}
    </ResponsiveContainer>
  );
}

  const [dept, setDept] = useState(null);

  const [pct, setPct] = useState(0);
  const [dashboard, setDashboard] = useState(null);
  const [activeTab, setActiveTab] = useState("overview");
  const [error, setError] = useState(null);
  const fileRef = useRef();

  const onDrop = async (e) => {
    e.preventDefault();
    const file = e.dataTransfer?.files?.[0] ?? e.target?.files?.[0];
    if (!file) return;
    try {
      if (file.name.endsWith(".pdf")) {
        const d = await parsePDF(file);
        setParsedFile(d); setRawText(d.text.slice(0, 2000));
      } else {
        const d = await parseExcelFile(file);
        setParsedFile(d); setRawText(sheetToText(Object.values(d.sheets)[0]));
      }
    } catch { setError("File read failed."); }
  };

  const generate = async () => {
    setScreen("processing"); setPct(10); setStepMsg("Extracting structure...");
    try {
      const raw = await callClaude(
        "Respond only with valid JSON. No markdown.",
        `Analyze: ${rawText.slice(0, 4000)}. Format: { "title": "", "kpis": [{"label":"", "value":"", "unit":"", "trend":"up|down", "change":""}], "charts": [{"type":"bar", "title":"", "data":[{"name":"", "value":0}]}] }`,
        4000, apiKey
      );
      
      setPct(80); setStepMsg("Parsing JSON...");
      /* FIX: Robust JSON Parsing */
      let cleanJSON = raw.replace(/```json/gi, "").replace(/```/gi, "").trim();
      const first = cleanJSON.indexOf('{');
      const last = cleanJSON.lastIndexOf('}');
      const parsed = JSON.parse(cleanJSON.substring(first, last + 1));
      
      setDashboard({ ...parsed, generatedAt: new Date().toLocaleTimeString() });
      setScreen("dashboard");
    } catch(err) {
      setError(err.message); setScreen("input");
    }
  };

    <>

        <div style={{padding:20,maxWidth:1200,margin:"0 auto"}}>
          <h1 className="au">{dashboard.title}</h1>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:15,marginTop:20}}>
            {dashboard.kpis.map((k,i)=>(
              <div key={i} className="kpi au" style={{padding:20,borderTop:`3px solid ${T.colors[i%12]}`}}>
                <div style={{fontSize:10,color:T.muted}}>{k.label}</div>
                <div style={{fontSize:24,fontWeight:800}}>{k.value} {k.unit}</div>
                <div style={{color:k.trend==="up"?T.accent3:T.danger}}>{k.change}</div>
              </div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginTop:20}}>
            {dashboard.charts.map((c,i)=>(
              <div key={i} className="card au" style={{padding:20}}>
                <div style={{fontWeight:700,marginBottom:15}}>{c.title}</div>
                <ChartRenderer chart={c} color={T.colors[i%12]}/>
              </div>
            ))}
          </div>
        </div>
      )}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);

setTimeout(()=>{
  const s=document.getElementById("splash");
  if(s){ s.classList.add("hide"); }
},500);
</script>

</body>
</html>
