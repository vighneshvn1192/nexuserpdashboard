// ── Script loader ─────────────────────────────────────────────────────────────
function loadScript(src) {
  return new Promise((res, rej) => {
    if (document.querySelector(`script[src="${src}"]`)) return res();
    const s = document.createElement("script");
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

// ── File Parsers ──────────────────────────────────────────────────────────────
async function loadPDFJS() {
  if (window.pdfjsLib) return window.pdfjsLib;
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
  window.pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  return window.pdfjsLib;
}

async function parsePDF(file) {
  const lib = await loadPDFJS();
  const buf = await file.arrayBuffer();
  const pdf = await lib.getDocument({ data: buf }).promise;
  let text = "";
  for (let i = 1; i <= Math.min(pdf.numPages, 20); i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(s => s.str).join(" ") + "\n";
  }
  return { text: text.slice(0, 6000), pages: pdf.numPages, fileName: file.name };
}

function parseExcelFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type:"array", cellDates:true, raw:false });
        const sheets = {};
        let totalRows = 0;
        wb.SheetNames.forEach(name => {
          const ws  = wb.Sheets[name];
          const raw = XLSX.utils.sheet_to_json(ws, { header:1, defval:"", blankrows:false });
          const json= XLSX.utils.sheet_to_json(ws, { defval:"" });
          sheets[name] = { raw, json, rowCount: raw.length };
          totalRows += raw.length;
        });
        resolve({ sheets, sheetNames: wb.SheetNames, totalRows, fileName: file.name });
      } catch(err){ reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

function sheetToText(sheetData, maxRows = 35) {
  let out = "";
  sheetData.raw.slice(0, maxRows).forEach((row, i) => {
    const line = row.filter(c => c !== "" && c != null).join(" | ");
    if (line.trim()) out += `Row${i+1}: ${line}\n`;
  });
  if (sheetData.raw.length > maxRows) out += `... (${sheetData.raw.length - maxRows} more rows)\n`;
  return out;
}

// ── Claude API — FIX [G1,G2] ─────────────────────────────────────────────────
async function callClaude(system, user, maxTokens = 5000, apiKey = "") {
  const headers = {
    "Content-Type": "application/json",
    "anthropic-version": "2023-06-01",
  };
  if (apiKey) {
    headers["x-api-key"] = apiKey;
    headers["anthropic-dangerous-direct-browser-access"] = "true";
  }
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers,
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: maxTokens,
      system,
      messages: [{ role:"user", content: user }],
    }),
  });
  const d = await res.json();
  if (d.error) throw new Error(d.error.message || `API error ${res.status} — verify your API key`);
  return d.content?.[0]?.text ?? "";
}

// ── Export: Excel ─────────────────────────────────────────────────────────────
function exportToExcel(dashboard, parsedFile) {
  const wb = XLSX.utils.book_new();
  const app = (ws, name) => XLSX.utils.book_append_sheet(wb, ws, name.slice(0,31));
  const ws1 = XLSX.utils.aoa_to_sheet([
    ["NEXUS ERP — AI Dashboard Report"],
    ["Department", dashboard.department?.toUpperCase() ?? ""],
    ["Title", dashboard.title ?? ""],
    ["Period", dashboard.period ?? ""],
    ["Generated", dashboard.generatedAt ?? ""],
    [], ["EXECUTIVE SUMMARY"], [dashboard.executiveSummary ?? ""],
    [], ["CFO NARRATIVE"], [dashboard.narrative ?? ""],
  ]);
  ws1["!cols"] = [{wch:22},{wch:90}]; app(ws1, "Executive Summary");
  const ws2 = XLSX.utils.aoa_to_sheet([
    ["#","Metric","Value","Unit","Trend","Change"],
    ...(dashboard.kpis ?? []).map((k,i) => [i+1, k.label, k.value, k.unit, k.trend, k.change]),
  ]);
  ws2["!cols"] = [{wch:4},{wch:30},{wch:16},{wch:12},{wch:10},{wch:16}]; app(ws2, "KPI Dashboard");
  const chartRows = [["Chart Title","Label","Value","Secondary"]];
  (dashboard.charts ?? []).forEach(c => {
    (c.data ?? []).forEach(d => chartRows.push([c.title, d.name, d.value, d.secondary ?? ""]));
    chartRows.push([]);
  });
  const ws3 = XLSX.utils.aoa_to_sheet(chartRows);
  ws3["!cols"] = [{wch:32},{wch:24},{wch:18},{wch:18}]; app(ws3, "Chart Data");
  const ws4 = XLSX.utils.aoa_to_sheet([
    ["TYPE","INSIGHT"],
    ...(dashboard.insights ?? []).map(i => [i.type?.toUpperCase(), `${i.icon ?? ""} ${i.text}`]),
    [], ["RECOMMENDATIONS"],
    ...(dashboard.recommendations ?? []).map((r,i) => [`#${i+1}`, r]),
  ]);
  ws4["!cols"] = [{wch:16},{wch:90}]; app(ws4, "Insights");
  if (parsedFile?.sheets) {
    Object.entries(parsedFile.sheets).slice(0,4).forEach(([name, sheet]) => {
      if (sheet.raw?.length > 0) app(XLSX.utils.aoa_to_sheet(sheet.raw), `Src: ${name}`);
    });
  }

// ── Animated counter ──────────────────────────────────────────────────────────
function AnimatedNum({ value }) {
  const [disp, setDisp] = useState("0");
  const num = useMemo(() => parseFloat(String(value).replace(/[^0-9.-]/g,"")) || 0, [value]);
  useEffect(() => {
    const steps = 24; let cur = 0;
    const inc = num / steps;
    let raf;
    const tick = () => {
      cur += inc;
      if (cur >= num) { setDisp(String(value)); return; }
      setDisp(cur.toLocaleString(undefined, { maximumFractionDigits:1 }));
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [num, value]);
  return <>{disp}</>;
}

// ── Gauge SVG ─────────────────────────────────────────────────────────────────
function GaugeChart({ value, max=100, color=T.accent, label="" }) {
  const pct = Math.min(1, Math.max(0, value / max));
  const r=70, cx=90, cy=90;
  const toXY = (a, rad) => {
    const r2 = (a * Math.PI) / 180;
    return [cx + rad * Math.cos(r2), cy + rad * Math.sin(r2)];
  };
  const arcPath = (a1, a2, rad) => {
    const [x1,y1] = toXY(a1, rad);
    const [x2,y2] = toXY(a2, rad);
    const large = Math.abs(a2-a1) > 180 ? 1 : 0;
    return `M ${x1} ${y1} A ${rad} ${rad} 0 ${large} 1 ${x2} ${y2}`;
  };
  const startAngle=-210, sweep=240;
  const endAngle = startAngle + sweep * pct;
  return (
    <svg viewBox="0 0 180 130" style={{width:"100%",maxWidth:180}}>
      <path d={arcPath(startAngle, startAngle+sweep, r)} fill="none" stroke={T.border} strokeWidth={12} strokeLinecap="round"/>
      <path d={arcPath(startAngle, endAngle, r)} fill="none" stroke={color} strokeWidth={12} strokeLinecap="round"
        style={{filter:`drop-shadow(0 0 6px ${color}88)`}}/>
      <text x={cx} y={cy-2} textAnchor="middle" fill={T.text} fontSize="22" fontWeight="800" fontFamily="JetBrains Mono">
        {Math.round(pct*100)}%
      </text>
      <text x={cx} y={cy+18} textAnchor="middle" fill={T.muted} fontSize="9" fontFamily="DM Sans">{label}</text>
      <text x={cx} y={cy+35} textAnchor="middle" fill={color} fontSize="11" fontFamily="JetBrains Mono">
        {value} / {max}
      </text>
    </svg>
  );
}

// ── Heatmap ───────────────────────────────────────────────────────────────────
function HeatmapChart({ data, height=255 }) {
  if (!data?.length) return null;
  const rows=Math.min(data.length,8), cols=6;
  const cells=data.slice(0, rows*cols);
  const vals=cells.map(d=>Number(d.value)||0);
  const mn=Math.min(...vals), mx=Math.max(...vals)||1;
  const interp=(v)=>{
    const t=(v-mn)/(mx-mn);
    return `rgb(${Math.round(t*0+(1-t)*30)},${Math.round(t*180+(1-t)*30)},${Math.round(t*120+(1-t)*80)})`;
  };
  return (
    <div style={{display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,gap:3,height}}>
      {Array.from({length:rows*cols},(_,i)=>{
        const d=cells[i];
        return (
          <div key={i} title={d?`${d.name}: ${d.value}`:""}
            style={{borderRadius:4,background:d?interp(Number(d.value)):T.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"rgba(255,255,255,.75)",fontFamily:"JetBrains Mono",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",padding:"2px 3px",cursor:"default"}}>
            {d?.value}
          </div>
        );
      })}
    </div>
  );
}

// ── Waterfall ─────────────────────────────────────────────────────────────────
function WaterfallChart({ data, height=255 }) {
  if (!data?.length) return null;
  let running=0;
  const wData=data.map((d,i)=>{
    const val=Number(d.value)||0;
    const base=i===0?0:running;
    running+=val;
    return {name:d.name,value:Math.abs(val),base,positive:val>=0,running};
  });
  return (
    <ResponsiveContainer width="100%" height={height}>
      <BarChart data={wData} barSize={28}>
        <CartesianGrid strokeDasharray="3 3" stroke={T.border} vertical={false}/>
        <XAxis dataKey="name" tick={{fill:T.muted,fontSize:10}} axisLine={false} tickLine={false}/>
        <YAxis tick={{fill:T.muted,fontSize:10}} axisLine={false} tickLine={false}/>
        <Tooltip contentStyle={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,fontSize:11}}
          formatter={(v,n,p)=>n==="value"?[p.payload.running,"Running Total"]:[v,n]}/>
        <Bar dataKey="base" fill="transparent" stackId="a"/>
        <Bar dataKey="value" stackId="a" radius={[4,4,0,0]}>
          {wData.map((d,i)=><Cell key={i} fill={d.positive?T.accent3:T.danger}/>)}
        </Bar>
      </BarChart>
    </ResponsiveContainer>
  );
}

// ── Lollipop ──────────────────────────────────────────────────────────────────
function LollipopChart({ data, height=255 }) {
  if (!data?.length) return null;
  return (
    <ResponsiveContainer width="100%" height={height}>
      <ComposedChart data={data} layout="vertical">
        <CartesianGrid strokeDasharray="3 3" stroke={T.border} horizontal={false}/>
        <XAxis type="number" tick={{fill:T.muted,fontSize:10}} axisLine={false} tickLine={false}/>
        <YAxis type="category" dataKey="name" tick={{fill:T.muted,fontSize:10}} axisLine={false} tickLine={false} width={70}/>
        <Tooltip contentStyle={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,fontSize:11}}/>
        <Bar dataKey="value" barSize={3} fill={T.accent} radius={0}/>
        <Scatter dataKey="value" fill={T.accent} r={6} stroke={T.bg} strokeWidth={2}/>
      </ComposedChart>
    </ResponsiveContainer>
  );
}

// ── Bullet ────────────────────────────────────────────────────────────────────
function BulletChart({ data, height=255 }) {
  if (!data?.length) return null;
  const items=data.slice(0,7);
  const maxVal=Math.max(...items.map(d=>Math.max(Number(d.value)||0,Number(d.secondary)||0)))||1;
  return (
    <div style={{height,display:"flex",flexDirection:"column",justifyContent:"space-around",padding:"8px 0"}}>
      {items.map((d,i)=>{
        const actual=Number(d.value)||0;
        const target=Number(d.secondary)||actual*1.2;
        return (
          <div key={i}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:10.5,color:T.muted}}>
              <span>{d.name}</span>
              <span style={{fontFamily:"JetBrains Mono",color:T.text}}>{actual.toLocaleString()}</span>
            </div>
            <div style={{position:"relative",height:14,background:T.border,borderRadius:3,overflow:"hidden"}}>
              <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${(actual/maxVal)*100}%`,background:`linear-gradient(90deg,${T.colors[i%12]},${T.colors[i%12]}88)`,borderRadius:3}}/>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Semi-Donut ────────────────────────────────────────────────────────────────
function SemiDonutChart({ data, height=255 }) {
  if (!data?.length) return null;
  const total=data.reduce((s,d)=>s+(Number(d.value)||0),0)||1;
  return (
    <ResponsiveContainer width="100%" height={height}>
      <PieChart>
        <Pie data={data} dataKey="value" nameKey="name" cx="50%" cy="80%"
          startAngle={180} endAngle={0} outerRadius={height*.6} innerRadius={height*.35}>
          {data.map((_,i)=><Cell key={i} fill={T.colors[i%T.colors.length]}/>)}
        </Pie>
        <Tooltip contentStyle={{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,fontSize:11}}
          formatter={(v)=>[`${((v/total)*100).toFixed(1)}% (${v.toLocaleString()})`,""]}/>
        <Legend wrapperStyle={{fontSize:11,color:T.muted}}/>
      </PieChart>
    </ResponsiveContainer>
  );
}

// ── Chart Renderer ─────────────────────────────────────────────────────────────
const TT = {
  contentStyle:{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,fontSize:11.5,fontFamily:"DM Sans,sans-serif"},
  labelStyle:{color:T.muted},
  itemStyle:{color:T.text},
  cursor:{fill:`${T.accent}08`},
};

function ChartRenderer({ chart, height=255, color }) {
  const data  = chart?.data ?? [];
  const type  = chart?.type ?? "bar";
  const hasSec= data.some(d=>d.secondary!=null && d.secondary!=="");
  const cc    = color || T.accent;

  if (!data.length) return (
    <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:T.muted,fontSize:12.5}}>No data</div>
  );

  if (type==="heatmap")   return <HeatmapChart   data={data} height={height}/>;
  if (type==="waterfall") return <WaterfallChart  data={data} height={height}/>;
  if (type==="lollipop")  return <LollipopChart   data={data} height={height}/>;
  if (type==="bullet")    return <BulletChart     data={data} height={height}/>;
  if (type==="semidonut") return <SemiDonutChart  data={data} height={height}/>;

  if (type==="polararea") return (
    <ResponsiveContainer width="100%" height={height}>
      <RadarChart data={data}>
        <PolarGrid stroke={T.border}/>
        <PolarAngleAxis dataKey="name" tick={{fill:T.muted,fontSize:10}}/>
        <PolarRadiusAxis tick={{fill:T.muted,fontSize:9}}/>
        <Radar dataKey="value" fill={cc} stroke={cc} fillOpacity={.4}/>
        {hasSec&&<Radar dataKey="secondary" fill={T.accent2} stroke={T.accent2} fillOpacity={.25}/>}
        <Tooltip {...TT}/>
        <Legend wrapperStyle={{fontSize:11,color:T.muted}}/>
      </RadarChart>
    </ResponsiveContainer>
  );

  if (type==="gauge") {
    const total=data.reduce((s,v)=>s+(Number(v.value)||0),0)||100;
    return (
      <div style={{height,display:"flex",flexWrap:"wrap",alignItems:"center",justifyContent:"center",gap:10}}>
        {data.slice(0,4).map((d2,i)=>(
          <GaugeChart key={i} value={Number(d2.value)||0} max={total} color={T.colors[i%T.colors.length]} label={d2.name}/>
        ))}
      </div>
    );
  }

  if (type==="scatter"||type==="bubble") {
    const pts=data.map(d=>({x:parseFloat(d.value)||0,y:parseFloat(d.secondary)||0,z:type==="bubble"?Math.abs(parseFloat(d.value)||20):60,name:d.name}));
    return (
      <ResponsiveContainer width="100%" height={height}>
        <ScatterChart>
          <CartesianGrid strokeDasharray="3 3" stroke={T.border} opacity={.5}/>
          <XAxis type="number" dataKey="x" tick={{fill:T.muted,fontSize:10}} axisLine={false} tickLine={false}/>
          <YAxis type="number" dataKey="y" tick={{fill:T.muted,fontSize:10}} axisLine={false} tickLine={false}/>
          <ZAxis dataKey="z" range={type==="bubble"?[40,300]:[50,50]}/>
          <Tooltip {...TT} content={({payload})=>{
            if(!payload?.length) return null;
            const p=payload[0].payload;
            return <div style={TT.contentStyle}><b style={{color:T.text,display:"block",marginBottom:3}}>{p.name}</b><span style={{color:T.accent}}>x:{p.x}</span> · <span style={{color:T.accent2}}>y:{p.y}</span></div>;
          }}/>
          <Scatter data={pts} fill={cc} fillOpacity={.7} stroke={cc} strokeWidth={.5}/>
        </ScatterChart>
      </ResponsiveContainer>
    );
  }

  if (type==="treemap") {
    const colored=data.map((d,i)=>({...d,color:T.colors[i%T.colors.length]}));
    return (
      <ResponsiveContainer width="100%" height={height}>
        <Treemap data={colored} dataKey="value" nameKey="name" aspectRatio={4/3}
          content={({x,y,width,height:h,name,value,color:fillColor})=>(
            <g>
              <rect x={x} y={y} width={width} height={h} fill={fillColor} stroke={T.card} strokeWidth={2} rx={4}/>
              {width>40&&h>25&&(
                <>
                  <text x={x+width/2} y={y+h/2-4} textAnchor="middle" fill="white" fontSize={10} fontFamily="DM Sans">{name}</text>
                  <text x={x+width/2} y={y+h/2+12} textAnchor="middle" fill="rgba(255,255,255,.7)" fontSize={9} fontFamily="JetBrains Mono">{(value||0).toLocaleString()}</text>
                </>
              )}
            </g>
          )}/>
      </ResponsiveContainer>
    );
  }

  if (type==="funnel") {
    return (
      <ResponsiveContainer width="100%" height={height}>
        <FunnelChart>
          <Tooltip contentStyle={TT.contentStyle}/>
          <Funnel dataKey="value" data={data} isAnimationActive>
            {data.map((_,i)=><Cell key={i} fill={T.colors[i%T.colors.length]}/>)}
            <LabelList position="right" fill={T.muted} stroke="none" fontSize={11}/>
          </Funnel>
        </FunnelChart>
      </ResponsiveContainer>
    );
  }

  if (type==="radialbar") {
    const radData=data.slice(0,8).map((d,i)=>({...d,value:Number(d.value)||0,fill:T.colors[i%T.colors.length]}));
    return (
      <ResponsiveContainer width="100%" height={height}>
        <RadialBarChart innerRadius="20%" outerRadius="90%" data={radData} startAngle={180} endAngle={0}>
          <RadialBar background={{fill:T.border}} dataKey="value" cornerRadius={4}/>
          <Tooltip {...TT}/>
          <Legend iconSize={10} wrapperStyle={{fontSize:11,color:T.muted}}/>
        </RadialBarChart>
      </ResponsiveContainer>
    );
  }

  if (type==="pie"||type==="donut") {
    return (
      <ResponsiveContainer width="100%" height={height}>
        <PieChart>
          <Pie data={data} dataKey="value" nameKey="name" cx="50%" cy="50%"
            outerRadius={height*.36} innerRadius={type==="donut"?height*.2:0}
            paddingAngle={type==="donut"?3:1} strokeWidth={0}>
            {data.map((_,i)=><Cell key={i} fill={T.colors[i%T.colors.length]}/>)}
          </Pie>
          <Tooltip {...TT}/>
          <Legend wrapperStyle={{fontSize:11,color:T.muted}}/>
        </PieChart>
      </ResponsiveContainer>
    );
  }

  if (type==="radar") {
    return (
      <ResponsiveContainer width="100%" height={height}>
        <RadarChart data={data}>
          <PolarGrid stroke={T.border}/>
          <PolarAngleAxis dataKey="name" tick={{fill:T.muted,fontSize:10}}/>
          <PolarRadiusAxis tick={{fill:T.muted,fontSize:9}}/>
          <Radar dataKey="value" stroke={cc} fill={cc} fillOpacity={.18} name="Value"/>
          {hasSec&&<Radar dataKey="secondary" stroke={T.accent2} fill={T.accent2} fillOpacity={.1} name="Target"/>}
          <Tooltip {...TT}/>
          {hasSec&&<Legend wrapperStyle={{fontSize:11,color:T.muted}}/>}
        </RadarChart>
      </ResponsiveContainer>
    );
  }

  if (type==="histogram") {
    const vals=data.map(d=>Number(d.value)||0);
    const mn=Math.min(...vals), mx=Math.max(...vals);
    const bins=8; const bw=(mx-mn)/bins||1;
    const counts=Array.from({length:bins},(_,i)=>{
      const lo=mn+i*bw, hi=lo+bw;
      return {name:`${Math.round(lo)}-${Math.round(hi)}`,count:vals.filter(v=>v>=lo&&v<hi+(i===bins-1?1:0)).length};
    });
    return (
      <ResponsiveContainer width="100%" height={height}>
        <BarChart data={counts} barGap={1}>
          <CartesianGrid strokeDasharray="3 3" stroke={T.border} vertical={false}/>
          <XAxis dataKey="name" tick={{fill:T.muted,fontSize:9}} axisLine={false} tickLine={false}/>
          <YAxis tick={{fill:T.muted,fontSize:10}} axisLine={false} tickLine={false}/>
          <Tooltip {...TT}/>
          <Bar dataKey="count" fill={cc} radius={[4,4,0,0]} name="Count"/>
        </BarChart>
      </ResponsiveContainer>
    );
  }

  if (type==="hbar") {
    return (
      <ResponsiveContainer width="100%" height={height}>
        <BarChart data={data} layout="vertical" barGap={2}>
          <CartesianGrid strokeDasharray="3 3" stroke={T.border} horizontal={false}/>
          <XAxis type="number" tick={{fill:T.muted,fontSize:10}} axisLine={false} tickLine={false}/>
          <YAxis type="category" dataKey="name" tick={{fill:T.muted,fontSize:10}} axisLine={false} tickLine={false} width={75}/>
          <Tooltip {...TT}/>
          {hasSec&&<Legend wrapperStyle={{fontSize:11,color:T.muted}}/>}
          <Bar dataKey="value" fill={cc} radius={[0,4,4,0]} name="Value"/>
          {hasSec&&<Bar dataKey="secondary" fill={T.accent2} radius={[0,4,4,0]} name="Target"/>}
        </BarChart>
      </ResponsiveContainer>
    );
  }

  if (type==="stacked"||type==="grouped") {
    const stackId=type==="stacked"?"s":undefined;
    return (
      <ResponsiveContainer width="100%" height={height}>
        <BarChart data={data} barGap={type==="grouped"?4:2}>
          <CartesianGrid strokeDasharray="3 3" stroke={T.border} vertical={false}/>
          <XAxis dataKey="name" tick={{fill:T.muted,fontSize:10}} axisLine={false} tickLine={false}/>
          <YAxis tick={{fill:T.muted,fontSize:10}} axisLine={false} tickLine={false}/>
          <Tooltip {...TT}/>
          <Legend wrapperStyle={{fontSize:11,color:T.muted}}/>
          <Bar dataKey="value" fill={cc} radius={type==="grouped"?[4,4,0,0]:[0,0,0,0]} name="Value" stackId={stackId}/>
          {hasSec&&<Bar dataKey="secondary" fill={T.accent2} radius={type==="grouped"?[4,4,0,0]:[4,4,0,0]} name="Secondary" stackId={stackId}/>}
        </BarChart>
      </ResponsiveContainer>
    );
  }

  if (type==="bar") {
    return (
      <ResponsiveContainer width="100%" height={height}>
        <BarChart data={data} barGap={2}>
          <CartesianGrid strokeDasharray="3 3" stroke={T.border} vertical={false}/>
          <XAxis dataKey="name" tick={{fill:T.muted,fontSize:10}} axisLine={false} tickLine={false}/>
          <YAxis tick={{fill:T.muted,fontSize:10}} axisLine={false} tickLine={false}/>
          <Tooltip {...TT}/>
          {hasSec&&<Legend wrapperStyle={{fontSize:11,color:T.muted}}/>}
          <Bar dataKey="value" fill={cc} radius={[5,5,0,0]} name="Value"/>
          {hasSec&&<Bar dataKey="secondary" fill={T.accent2} radius={[5,5,0,0]} name="Target"/>}
        </BarChart>
      </ResponsiveContainer>
    );
  }

  if (type==="combo") {
    return (
      <ResponsiveContainer width="100%" height={height}>
        <ComposedChart data={data}>
          <CartesianGrid strokeDasharray="3 3" stroke={T.border} vertical={false}/>
          <XAxis dataKey="name" tick={{fill:T.muted,fontSize:10}} axisLine={false} tickLine={false}/>
          <YAxis tick={{fill:T.muted,fontSize:10}} axisLine={false} tickLine={false}/>
          <Tooltip {...TT}/>
          <Legend wrapperStyle={{fontSize:11,color:T.muted}}/>
          <Bar dataKey="value" fill={cc} radius={[4,4,0,0]} fillOpacity={.8} name="Value"/>
          {hasSec&&<Line type="monotone" dataKey="secondary" stroke={T.accent2} strokeWidth={2.5} dot={{fill:T.accent2,r:3}} name="Target"/>}
        </ComposedChart>
      </ResponsiveContainer>
    );
  }

  if (type==="line"||type==="stepline") {
    return (
      <ResponsiveContainer width="100%" height={height}>
        <LineChart data={data}>
          <CartesianGrid strokeDasharray="3 3" stroke={T.border} vertical={false}/>
          <XAxis dataKey="name" tick={{fill:T.muted,fontSize:10}} axisLine={false} tickLine={false}/>
          <YAxis tick={{fill:T.muted,fontSize:10}} axisLine={false} tickLine={false}/>
          <Tooltip {...TT}/>
          {hasSec&&<Legend wrapperStyle={{fontSize:11,color:T.muted}}/>}
          <Line type={type==="stepline"?"step":"monotone"} dataKey="value" stroke={cc} strokeWidth={2.5} dot={{fill:cc,r:3.5,strokeWidth:0}} name="Value"/>
          {hasSec&&<Line type={type==="stepline"?"step":"monotone"} dataKey="secondary" stroke={T.accent2} strokeWidth={2} strokeDasharray="5 4" dot={{fill:T.accent2,r:3,strokeWidth:0}} name="Target"/>}
        </LineChart>
      </ResponsiveContainer>
    );
  }

  if (type==="stackedarea") {
    return (
      <ResponsiveContainer width="100%" height={height}>
        <AreaChart data={data}>
          <defs>
            <linearGradient id={`sa1-${chart.id}`} x1="0" y1="0" x2="0" y2="1">
              <stop offset="5%" stopColor={cc} stopOpacity={.45}/>
              <stop offset="95%" stopColor={cc} stopOpacity={.05}/>
            </linearGradient>
            <linearGradient id={`sa2-${chart.id}`} x1="0" y1="0" x2="0" y2="1">
              <stop offset="5%" stopColor={T.accent2} stopOpacity={.35}/>
              <stop offset="95%" stopColor={T.accent2} stopOpacity={.03}/>
            </linearGradient>
          </defs>
          <CartesianGrid strokeDasharray="3 3" stroke={T.border} vertical={false}/>
          <XAxis dataKey="name" tick={{fill:T.muted,fontSize:10}} axisLine={false} tickLine={false}/>
          <YAxis tick={{fill:T.muted,fontSize:10}} axisLine={false} tickLine={false}/>
          <Tooltip {...TT}/>
          <Legend wrapperStyle={{fontSize:11,color:T.muted}}/>
          <Area type="monotone" dataKey="value" stroke={cc} fill={`url(#sa1-${chart.id})`} strokeWidth={2} stackId="s" name="Value"/>
          {hasSec&&<Area type="monotone" dataKey="secondary" stroke={T.accent2} fill={`url(#sa2-${chart.id})`} strokeWidth={2} stackId="s" name="Target"/>}
        </AreaChart>
      </ResponsiveContainer>
    );
  }

  if (type==="kpicard") {
    return (
      <div style={{height,display:"flex",flexWrap:"wrap",gap:8,alignContent:"flex-start",overflowY:"auto"}}>
        {data.slice(0,8).map((d,i)=>(
          <div key={i} style={{flex:"1 1 140px",background:T.card2,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 14px",borderTop:`3px solid ${T.colors[i%12]}`}}>
            <div style={{fontSize:9,color:T.muted,textTransform:"uppercase",letterSpacing:".07em",marginBottom:5}}>{d.name}</div>
            <div style={{fontSize:22,fontWeight:800,fontFamily:"JetBrains Mono"}}>{(Number(d.value)||0).toLocaleString()}</div>
            {d.secondary!=null&&<div style={{fontSize:11,color:T.accent3,marginTop:3}}>▲ vs {d.secondary}</div>}
          </div>
        ))}
      </div>
    );
  }

  // default — area
  return (
    <ResponsiveContainer width="100%" height={height}>
      <AreaChart data={data}>
        <defs>
          <linearGradient id={`ga-${chart.id}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="5%" stopColor={cc} stopOpacity={.28}/>
            <stop offset="95%" stopColor={cc} stopOpacity={0}/>
          </linearGradient>
          <linearGradient id={`gb-${chart.id}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="5%" stopColor={T.accent2} stopOpacity={.2}/>
            <stop offset="95%" stopColor={T.accent2} stopOpacity={0}/>
          </linearGradient>
        </defs>
        <CartesianGrid strokeDasharray="3 3" stroke={T.border} vertical={false}/>
        <XAxis dataKey="name" tick={{fill:T.muted,fontSize:10}} axisLine={false} tickLine={false}/>
        <YAxis tick={{fill:T.muted,fontSize:10}} axisLine={false} tickLine={false}/>
        <Tooltip {...TT}/>
        {hasSec&&<Legend wrapperStyle={{fontSize:11,color:T.muted}}/>}
        <Area type="monotone" dataKey="value" stroke={cc} fill={`url(#ga-${chart.id})`} strokeWidth={2.5} name="Value"/>
        {hasSec&&<Area type="monotone" dataKey="secondary" stroke={T.accent2} fill={`url(#gb-${chart.id})`} strokeWidth={2} name="Target"/>}
      </AreaChart>
    </ResponsiveContainer>
  );
}

        30+ chart types · Sliders &amp; filters · Excel / PDF / PowerPoint export
      </p>
    </div>
  );
}

// ── Overview Tab ──────────────────────────────────────────────────────────────
function OverviewTab({dashboard}) {
  const [selKPI,  setSelKPI]  = useState(null);
  const [thresh,  setThresh]  = useState(0);
  const [pctBars, setPctBars] = useState(false);

  const maxVal = useMemo(()=>{
    let m=0;
    (dashboard.charts??[]).slice(0,2).forEach(c=>(c.data??[]).forEach(d=>{if(Number(d.value)>m)m=Number(d.value);}));
    return m||100;
  },[dashboard.charts]);

  const previewCharts = useMemo(()=>
    (dashboard.charts??[]).slice(0,2).map(c=>({
      ...c,
      data: thresh>0 ? (c.data??[]).filter(d=>Number(d.value)>=thresh) : (c.data??[])
    }))
  ,[dashboard.charts,thresh]);

  return (
    <div>
      <div className="glass au" style={{padding:"13px 20px",marginBottom:18,display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{flex:1,fontSize:14,lineHeight:1.8}}>{dashboard.summary}</div>
        {dashboard.dataQuality&&(
          <div style={{textAlign:"center",padding:"9px 20px",borderLeft:`1px solid ${T.border}`,flexShrink:0}}>
            <div style={{fontWeight:800,fontSize:30,color:(dashboard.dataQuality.score??0)>80?T.accent3:T.warn}}>{dashboard.dataQuality.score}%</div>
            <div style={{fontSize:9.5,color:T.muted,textTransform:"uppercase",letterSpacing:".07em"}}>Data Quality</div>
            <div style={{fontSize:10.5,color:T.muted,marginTop:2}}>{dashboard.dataQuality.completeness}</div>
          </div>
        )}
      </div>

      <div className="card au1" style={{padding:"14px 18px",marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
          <span style={{fontWeight:700,fontSize:13}}>⚙️ Controls</span>
          <div style={{display:"flex",gap:6}}>
            <button className={`ctype ${pctBars?"on":""}`} onClick={()=>setPctBars(v=>!v)}>% Progress Bars</button>
            <button className="ctype" onClick={()=>{setSelKPI(null);setThresh(0);setPctBars(false);}}>Reset All</button>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
          <div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <span style={{fontSize:11,color:T.muted}}>Minimum Value Threshold</span>
              <span style={{fontFamily:"JetBrains Mono",color:T.accent,fontSize:11}}>{thresh.toLocaleString()}</span>
            </div>
            <input type="range" className="slider" min={0} max={maxVal} step={Math.max(1,Math.round(maxVal/100))} value={thresh} onChange={e=>setThresh(Number(e.target.value))}/>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:9.5,color:T.muted,marginTop:3}}>
              <span>0</span><span>{maxVal.toLocaleString(undefined,{maximumFractionDigits:0})}</span>
            </div>
          </div>
          <div>
            <div style={{fontSize:11,color:T.muted,marginBottom:7}}>Click KPI card to highlight / filter</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {(dashboard.kpis??[]).slice(0,8).map((k,i)=>(
                <button key={i} className={`ctype ${selKPI===i?"on":""}`} style={{fontSize:10,padding:"3px 8px"}} onClick={()=>setSelKPI(selKPI===i?null:i)}>
                  {k.label}
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(172px,1fr))",gap:12,marginBottom:20}}>
        {(dashboard.kpis??[]).map((kpi,i)=>(
          <div key={i} className={`kpi au ${selKPI===i?"sel":""}`}
            onClick={()=>setSelKPI(selKPI===i?null:i)}
            style={{padding:"16px 18px",borderTopWidth:2.5,borderTopColor:T.colors[i%12],animationDelay:`${i*.04}s`}}>
            <div style={{position:"absolute",bottom:0,left:0,right:0,height:3,background:`${T.colors[i%12]}15`}}>
              <div style={{height:"100%",background:T.colors[i%12],width:pctBars?`${Math.min(100,Math.abs(parseFloat(kpi.change)||50))}%`:"55%",transition:"width .7s ease",borderRadius:"0 2px 0 0"}}/>
            </div>
            <div style={{fontSize:9.5,color:T.muted,textTransform:"uppercase",letterSpacing:".07em",marginBottom:7,fontWeight:700}}>{kpi.label}</div>
            <div style={{display:"flex",alignItems:"baseline",gap:3,marginBottom:5}}>
              <span style={{fontFamily:"JetBrains Mono",fontWeight:800,fontSize:23}}><AnimatedNum value={kpi.value}/></span>
              {kpi.unit&&kpi.unit!=="units"&&<span style={{fontSize:12,color:T.muted}}>{kpi.unit}</span>}
            </div>
            <div style={{fontSize:11.5,fontWeight:600,color:kpi.trend==="up"?T.accent3:kpi.trend==="down"?T.danger:T.muted}}>
              {kpi.trend==="up"?"▲":kpi.trend==="down"?"▼":"→"} {kpi.change}
            </div>
          </div>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        {previewCharts.map((c,i)=>(
          <div key={i} className="card au1" style={{padding:20}}>
            <div style={{fontWeight:700,marginBottom:2,fontSize:14}}>{c.title}</div>
            <div style={{fontSize:11.5,color:T.muted,marginBottom:14}}>{c.subtitle}</div>
            <ChartRenderer chart={c} height={200} color={T.colors[i*2]}/>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Visualizations Tab (Power BI) ─────────────────────────────────────────────
function VisualizationsTab({dashboard}) {
  const [selCat,     setSelCat]     = useState("all");
  const [chartTypes, setChartTypes] = useState({});
  const [range,      setRange]      = useState(100);
  const [selIdx,     setSelIdx]     = useState(0);

  const cats = ["all",...Object.keys(CAT_LABELS)];
  const chart = (dashboard.charts??[])[selIdx];
  const appliedType = chart?(chartTypes[chart.id]||chart.type||"bar"):"bar";
  const vizInfo = CHART_REGISTRY.find(v=>v.id===appliedType);

  const slicedData = useMemo(()=>{
    if(!chart) return [];
    const n=Math.max(2,Math.round((chart.data??[]).length*range/100));
    return (chart.data??[]).slice(0,n);
  },[chart,range]);

  return (
    <div style={{display:"grid",gridTemplateColumns:"220px 1fr",gap:16,minHeight:600}}>
      {/* Viz panel */}
      <div className="card" style={{padding:"14px 12px",height:"fit-content",position:"sticky",top:20}}>
        <div style={{fontWeight:700,fontSize:12,marginBottom:12,color:T.text}}>Visualization Types</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:12}}>
          {cats.map(c=>(
            <button key={c} className={`chip ${selCat===c?"on":""}`}
              style={{fontSize:9.5,padding:"3px 8px","--cc":T.accent}}
              onClick={()=>setSelCat(c)}>
              {c==="all"?"All":CAT_LABELS[c]?.split(" ")[0]}
            </button>
          ))}
        </div>
        {(selCat==="all"?Object.keys(CAT_LABELS):[selCat]).map(cat=>{
          const items=CHART_REGISTRY.filter(c=>c.cat===cat);
          if(!items.length) return null;
          return (
            <div key={cat} style={{marginBottom:12}}>
              {selCat==="all"&&(
                <div style={{fontSize:9,color:T.muted,textTransform:"uppercase",letterSpacing:".07em",fontWeight:700,marginBottom:6,padding:"0 2px"}}>
                  {CAT_LABELS[cat]}
                </div>
              )}
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4}}>
                {items.map(v=>(
                  <button key={v.id} className={`viz-btn ${chart&&(chartTypes[chart.id]||chart.type)===v.id?"on":""}`}
                    onClick={()=>{ if(chart) setChartTypes(p=>({...p,[chart.id]:v.id})); }}>
                    <span className="viz-icon">{v.icon}</span>
                    <span className="viz-label">{v.label}</span>
                  </button>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      {/* Chart view */}
      <div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
          {(dashboard.charts??[]).map((c,i)=>(
            <button key={i} className={`ctype ${selIdx===i?"on":""}`}
              style={{fontSize:11,padding:"5px 12px"}}
              onClick={()=>setSelIdx(i)}>
              {i+1}: {c.title?.slice(0,22)}
            </button>
          ))}
        </div>

        {chart&&(
          <div className="card" style={{padding:24}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,gap:12,flexWrap:"wrap"}}>
              <div>
                <div style={{fontWeight:700,fontSize:16,marginBottom:3}}>{chart.title}</div>
                <div style={{fontSize:12,color:T.muted}}>{chart.subtitle}</div>
                {vizInfo&&(
                  <div style={{marginTop:6,display:"inline-flex",alignItems:"center",gap:5,padding:"3px 10px",background:`${T.accent}10`,border:`1px solid ${T.accent}33`,borderRadius:100}}>
                    <span style={{fontSize:11,fontFamily:"JetBrains Mono",color:T.accent}}>{vizInfo.icon}</span>
                    <span style={{fontSize:10.5,color:T.accent,fontWeight:600}}>{vizInfo.label}</span>
                  </div>
                )}
              </div>
              <div style={{minWidth:180}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:10.5,color:T.muted}}>Data range</span>
                  <span style={{fontFamily:"JetBrains Mono",color:T.accent,fontSize:10.5}}>{slicedData.length}/{(chart.data??[]).length} pts</span>
                </div>
                <input type="range" className="slider" min={20} max={100} step={5} value={range} onChange={e=>setRange(Number(e.target.value))}/>
              </div>
            </div>
            <ChartRenderer chart={{...chart,type:appliedType,data:slicedData}} height={320} color={T.colors[selIdx%T.colors.length]}/>
          </div>
        )}

        <div style={{marginTop:16}}>
          <div style={{fontWeight:600,fontSize:13,marginBottom:12,color:T.muted}}>All Charts Overview</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:12}}>
            {(dashboard.charts??[]).map((c,i)=>(
              <div key={i} className="card" style={{padding:16,cursor:"pointer",borderColor:selIdx===i?T.accent+"66":T.border}}
                onClick={()=>setSelIdx(i)}>
                <div style={{fontWeight:600,fontSize:12.5,marginBottom:10,display:"flex",justifyContent:"space-between"}}>
                  <span>{c.title}</span>
                  <span style={{fontSize:10,color:T.muted}}>{chartTypes[c.id]||c.type}</span>
                </div>
                <ChartRenderer chart={{...c,type:chartTypes[c.id]||c.type||"bar"}} height={130} color={T.colors[i%T.colors.length]}/>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Insights Tab ──────────────────────────────────────────────────────────────
function InsightsTab({dashboard}) {
  const [filter,setFilter]=useState("all");
  const typeColor={positive:T.accent3,negative:T.danger,alert:T.warn,neutral:T.accent};
  const shown=(dashboard.insights??[]).filter(i=>filter==="all"||i.type===filter);
  return (
    <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:18}}>
      <div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          <span style={{fontWeight:800,fontSize:17}}>AI Insights</span>
          {["all","positive","negative","alert","neutral"].map(f=>(
            <button key={f} className={`chip ${filter===f?"on":""}`}
              style={{"--cc":typeColor[f]??T.muted}} onClick={()=>setFilter(f)}>{f}</button>
          ))}
          <span style={{fontSize:11,color:T.muted,marginLeft:"auto"}}>{shown.length} results</span>
        </div>
        {shown.map((ins,i)=>(
          <div key={i} className="card au" style={{display:"flex",gap:12,padding:"12px 15px",marginBottom:10,animationDelay:`${i*.05}s`,borderLeft:`3px solid ${typeColor[ins.type]??T.accent}`,borderRadius:"0 12px 12px 0"}}>
            <span style={{fontSize:22,flexShrink:0}}>{ins.icon}</span>
            <div>
              <span className="badge" style={{marginBottom:5,background:`${typeColor[ins.type]??T.accent}16`,color:typeColor[ins.type]??T.muted}}>{ins.type}</span>
              <div style={{fontSize:13.5,lineHeight:1.65}}>{ins.text}</div>
            </div>
          </div>
        ))}
        {!shown.length&&<div style={{color:T.muted,padding:"20px 0",fontSize:13}}>No insights match this filter.</div>}
      </div>
      <div>
        <div style={{fontWeight:800,fontSize:17,marginBottom:16}}>Recommendations</div>
        {(dashboard.recommendations??[]).map((rec,i)=>(
          <div key={i} className="card au" style={{display:"flex",gap:10,padding:"12px 14px",marginBottom:10,animationDelay:`${i*.06}s`,borderColor:`${T.accent}30`}}>
            <div style={{width:24,height:24,borderRadius:"50%",background:`${T.accent}16`,border:`1px solid ${T.accent}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:T.accent,flexShrink:0,marginTop:1}}>{i+1}</div>
            <div style={{fontSize:13.5,lineHeight:1.65}}>{rec}</div>
          </div>
        ))}
        {dashboard.dataQuality&&(
          <div className="card" style={{padding:18,marginTop:18}}>
            <div style={{fontWeight:700,marginBottom:12,fontSize:14}}>Data Quality</div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <div style={{flex:1,height:6,background:T.border,borderRadius:100,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${dashboard.dataQuality.score}%`,background:`linear-gradient(90deg,${T.accent3},${T.accent})`,borderRadius:100}}/>
              </div>
              <span style={{fontWeight:800,fontSize:19}}>{dashboard.dataQuality.score}%</span>
            </div>
            <div style={{fontSize:12,color:T.muted}}>Completeness: {dashboard.dataQuality.completeness}</div>
            {(dashboard.dataQuality.issues??[]).map((iss,i)=>(
              <div key={i} style={{fontSize:12,color:T.warn,marginTop:5}}>⚠ {iss}</div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

          <div>

          </div>
        </div>
        <div style={{fontSize:15.5,lineHeight:1.9,borderLeft:`3px solid ${T.accent}`,paddingLeft:18,marginBottom:22}}>{dashboard.executiveSummary}</div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>

// ── Raw Data Tab ──────────────────────────────────────────────────────────────
function RawDataTab({dashboard,parsedFile}) {
  const [search,setSearch]=useState("");
  const kpis=useMemo(()=>{
    const q=search.toLowerCase();
    return (dashboard.kpis??[]).filter(k=>!q||k.label?.toLowerCase().includes(q)||String(k.value).includes(q));
  },[dashboard.kpis,search]);
  return (
    <div>
      <input className="field au" value={search} onChange={e=>setSearch(e.target.value)}
        placeholder="🔍 Search KPIs…"
        style={{padding:"9px 14px",fontSize:13,marginBottom:16,borderRadius:9}}/>
      <div className="card au1" style={{padding:20,marginBottom:18,overflowX:"auto"}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>KPI Data Table</div>
        <table>
          <thead><tr>{["Metric","Value","Unit","Trend","Change"].map(h=><th key={h}>{h}</th>)}</tr></thead>
          <tbody>
            {kpis.map((k,i)=>(
              <tr key={i}>
                <td style={{fontWeight:500}}>{k.label}</td>
                <td style={{fontFamily:"JetBrains Mono",color:T.accent}}>{k.value}</td>
                <td style={{color:T.muted}}>{k.unit}</td>
                <td>{k.trend==="up"?"▲ up":k.trend==="down"?"▼ down":"→ stable"}</td>
                <td style={{fontWeight:700,color:k.trend==="up"?T.accent3:k.trend==="down"?T.danger:T.muted}}>{k.change}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(310px,1fr))",gap:12,marginBottom:18}}>
        {(dashboard.charts??[]).map((c,i)=>(
          <div key={i} className="card" style={{padding:16}}>
            <div style={{fontWeight:600,marginBottom:10,fontSize:13}}>{c.title}</div>
            <table style={{fontSize:11.5}}>
              <thead><tr>
                <th style={{fontSize:9.5}}>Label</th>
                <th style={{fontSize:9.5,textAlign:"right"}}>Value</th>
                {(c.data??[]).some(d=>d.secondary!=null)&&<th style={{fontSize:9.5,textAlign:"right"}}>2nd</th>}
              </tr></thead>
              <tbody>
                {(c.data??[]).map((row,j)=>(
                  <tr key={j}>
                    <td>{row.name}</td>
                    <td style={{fontFamily:"JetBrains Mono",textAlign:"right",color:T.accent}}>{row.value}</td>
                    {row.secondary!=null&&<td style={{fontFamily:"JetBrains Mono",textAlign:"right",color:T.accent2}}>{row.secondary}</td>}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        ))}
      </div>
      {parsedFile?.sheets&&Object.entries(parsedFile.sheets).map(([name,sheet])=>(
        <div key={name} className="card au2" style={{padding:18,marginBottom:12,overflowX:"auto"}}>
          <div style={{fontWeight:700,marginBottom:12,fontSize:13}}>📄 Source: "{name}" — {sheet.rowCount} rows</div>
          {(sheet.raw??[]).length>0&&(
            <table style={{fontSize:10.5}}>
              <thead><tr>{(sheet.raw[0]??[]).map((h,i)=><th key={i} style={{background:T.card}}>{h||`Col ${i+1}`}</th>)}</tr></thead>
              <tbody>
                {sheet.raw.slice(1,20).map((row,ri)=>(
                  <tr key={ri}>{row.map((cell,ci)=><td key={ci} style={{fontFamily:"JetBrains Mono",whiteSpace:"nowrap",maxWidth:150,overflow:"hidden",textOverflow:"ellipsis"}}>{String(cell??"")}</td>)}</tr>
                ))}
                {sheet.raw.length>20&&<tr><td colSpan={(sheet.raw[0]??[]).length} style={{color:T.muted,padding:"7px 12px"}}>…{sheet.raw.length-20} more rows</td></tr>}
              </tbody>
            </table>
          )}
        </div>
      ))}
      {parsedFile?.text&&(
        <div className="card au2" style={{padding:18,marginBottom:12}}>
          <div style={{fontWeight:700,marginBottom:10,fontSize:13}}>📄 PDF Text Preview — {parsedFile.pages} pages</div>
          <pre style={{fontFamily:"JetBrains Mono,monospace",fontSize:10.5,color:T.muted,lineHeight:1.7,whiteSpace:"pre-wrap",maxHeight:300,overflow:"auto"}}>{parsedFile.text.slice(0,2000)}{parsedFile.text.length>2000?"\n…":""}</pre>
        </div>
      )}
    </div>
  );
}

// ── Dashboard Shell ───────────────────────────────────────────────────────────
function DashboardView({dashboard,parsedFile,activeTab,setActiveTab,doExport,exporting}) {
  const dept=DEPTS.find(d=>d.id===dashboard.department)??DEPTS[0];
  const TABS=[
    {id:"overview",label:"Overview"},
    {id:"visualizations",label:"Visualizations"},
    {id:"insights",label:"Insights"},
    {id:"report",label:"Board Report"},
    {id:"data",label:"Raw Data"},
  ];
  const ExBtn=({type,icon,label})=>(
    <button className={`btn ${exporting===type?"active":""}`} onClick={()=>doExport(type)} disabled={!!exporting} style={{fontSize:12.5,padding:"7px 13px"}}>
      {exporting===type?<span className="spin" style={{fontSize:12}}>⟳</span>:icon}
      {exporting===type?"Exporting…":label}
    </button>
  );
  return (
    <div style={{maxWidth:1380,margin:"0 auto",padding:"22px 16px"}}>
      <div className="au" style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:6}}>
            <span style={{fontSize:22}}>{dept.icon}</span>
            <span className="badge" style={{background:dept.color+"18",color:dept.color,border:`1px solid ${dept.color}44`}}>{dept.label}</span>
            <span className="badge" style={{background:"rgba(255,255,255,.04)",color:T.muted,border:`1px solid ${T.border}`}}>AI Generated</span>
            {parsedFile&&<span className="badge" style={{background:`${T.accent3}12`,color:T.accent3,border:`1px solid ${T.accent3}33`}}>📁 {parsedFile.fileName}</span>}
          </div>
          <h1 style={{fontWeight:800,fontSize:24,letterSpacing:"-.02em",marginBottom:3}}>{dashboard.title}</h1>
          <div style={{color:T.muted,fontSize:12}}>Period: {dashboard.period} · Generated {dashboard.generatedAt}</div>
        </div>
        <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
          <ExBtn type="xlsx" icon="📊" label="Excel"/>
          <ExBtn type="pdf"  icon="📄" label="PDF"/>
          <ExBtn type="pptx" icon="📑" label="PPTX"/>
        </div>
      </div>
      <div style={{display:"flex",gap:3,marginBottom:22,borderBottom:`1px solid ${T.border}`}}>
        {TABS.map(t=>(
          <button key={t.id} className={`tab ${activeTab===t.id?"on":""}`} onClick={()=>setActiveTab(t.id)}>{t.label}</button>
        ))}
      </div>
      {activeTab==="overview"       && <OverviewTab       dashboard={dashboard}/>}
      {activeTab==="visualizations" && <VisualizationsTab dashboard={dashboard}/>}
      {activeTab==="insights"       && <InsightsTab       dashboard={dashboard}/>}
      {activeTab==="report"         && <ReportTab         dashboard={dashboard}/>}
      {activeTab==="data"           && <RawDataTab        dashboard={dashboard} parsedFile={parsedFile}/>}
    </div>
  );
}

// ══ MAIN APP ═════════════════════════════════════════════════════════════════
function App() {
  const [screen,     setScreen]     = useState("input");
  const [parsedFile, setParsedFile] = useState(null);
  const [rawText,    setRawText]    = useState("");
  const [dept,       setDept]       = useState(null);
  const [dragOver,   setDragOver]   = useState(false);
  const [stepMsg,    setStepMsg]    = useState("");
  const [pct,        setPct]        = useState(0);
  const [dashboard,  setDashboard]  = useState(null);
  const [activeTab,  setActiveTab]  = useState("overview");
  const [error,      setError]      = useState(null);
  const [exporting,  setExporting]  = useState(null);
  const [apiKey,     setApiKey]     = useState("");
  const [showKey,    setShowKey]    = useState(false);
  const fileRef = useRef();

  const handleFile = useCallback(async (file) => {
    if (!file) return;
    setError(null);
    try {
      if (file.name.toLowerCase().endsWith(".pdf")) {
        const pdfData = await parsePDF(file);
        setParsedFile(pdfData);
        setRawText(pdfData.text.slice(0,3000));
      } else {
        const parsed = await parseExcelFile(file);
        setParsedFile(parsed);
        const preview = Object.entries(parsed.sheets)
          .map(([n,s])=>`=== Sheet: ${n} (${s.rowCount} rows) ===\n${sheetToText(s,12)}`).join("\n\n");
        setRawText(preview.slice(0,3000));
      }
    } catch {
      setError("Could not read file. For Excel try saving as .csv first. For PDFs ensure they contain text (not scanned images).");
    }
  }, []);

  const onDrop = useCallback(async (e) => {
    e.preventDefault(); setDragOver(false);
    const file = e.dataTransfer?.files?.[0] ?? e.target?.files?.[0];
    if (file) await handleFile(file);
  }, [handleFile]);

  const generate = async () => {
    if (!rawText.trim() && !parsedFile) return;
    setScreen("processing"); setError(null); setPct(8);
    let dataContext = "";
    if (parsedFile?.sheets) {
      dataContext += `SOURCE FILE: ${parsedFile.fileName}\nTotal rows: ${parsedFile.totalRows}\nSheets: ${parsedFile.sheetNames.join(", ")}\n\n`;
      Object.entries(parsedFile.sheets).forEach(([name,s])=>{
        dataContext += `\n=== SHEET: "${name}" (${s.rowCount} rows) ===\n${sheetToText(s,35)}\n`;
      });
    } else if (parsedFile?.text) {
      dataContext += `SOURCE PDF: ${parsedFile.fileName} (${parsedFile.pages} pages)\n\n${parsedFile.text}\n`;
    } else {
      dataContext = rawText.slice(0,4500);
    }
    try {
      setStepMsg("🔍 RAG Pass 1 — Ingesting & structuring data..."); setPct(18);
      const raw = await callClaude(
        "You are a senior ERP data analyst. ALWAYS respond with pure valid JSON only. No markdown fences. No extra text before or after.",
        `Analyze ALL of the following business data comprehensively. Extract every meaningful metric.

DATA:
${dataContext}

Department hint: ${dept ?? "auto-detect from content"}

Return ONLY valid JSON (no markdown, no code fences):
{
  "department": "sales|hr|operations|finance|marketing|supply|it|executive",
  "title": "Precise data-driven title",
  "period": "Time period detected e.g. Jan-Dec 2024",
  "summary": "2-sentence description of what this data represents",
  "kpis": [{"label":"name","value":"actual value","unit":"$|%|units|hrs","trend":"up|down|stable","change":"+12.3% vs prev"}],
  "charts": [
    {"id":"c1","type":"area","title":"title","subtitle":"what it tracks","data":[{"name":"label","value":123,"secondary":45}]},
    {"id":"c2","type":"bar","title":"title","subtitle":"","data":[{"name":"label","value":123,"secondary":null}]},
    {"id":"c3","type":"pie","title":"title","subtitle":"","data":[{"name":"label","value":123}]},
    {"id":"c4","type":"radar","title":"title","subtitle":"","data":[{"name":"dim","value":85,"secondary":70}]},
    {"id":"c5","type":"scatter","title":"title","subtitle":"","data":[{"name":"item","value":100,"secondary":200}]}
  ],
  "insights": [{"type":"positive|negative|neutral|alert","text":"Insight with real numbers","icon":"emoji"}],
  "recommendations": ["Specific actionable recommendation"],
  "dataQuality": {"score":85,"issues":["issue text"],"completeness":"92%"},
  "executiveSummary": "4-5 sentence board-level summary with specific numbers"
}

STRICT RULES:
- Use ACTUAL values from the data — never invent numbers
- Generate 8-12 KPIs from real data columns
- Generate exactly 5 charts with 6-10 real data points each
- Generate 6-8 insights referencing real numbers
- Generate 4-5 actionable recommendations
- If multiple sheets, synthesise across all`,
        5500, apiKey
      );
      setPct(68); setStepMsg("🧠 RAG Pass 2 — Generating board narrative...");
      let parsed;
      try {
        const cleaned = raw.replace(/```json\s*/gi,"").replace(/```\s*/gi,"").trim();
        parsed = JSON.parse(cleaned);
      } catch {
        const m = raw.match(/\{[\s\S]*\}/);
        if (m) {
          try { parsed = JSON.parse(m[0]); }
          catch { throw new Error("AI returned malformed JSON. Please simplify your data and retry."); }
        } else {
          throw new Error("AI returned malformed JSON. Please simplify your data and retry.");
        }
      }
      const narrative = await callClaude(
        "You are a CFO delivering a board briefing. Write concise, data-driven executive narrative. No bullet points. 4-5 sentences.",
        `Write CFO narrative for ${parsed.department} department.
KPIs: ${JSON.stringify((parsed.kpis??[]).slice(0,6))}
Top insights: ${JSON.stringify((parsed.insights??[]).slice(0,3))}
Lead recommendation: ${(parsed.recommendations??[])[0]??""}
Be specific with numbers. Cover context, performance, and direction.`,
        550, apiKey
      );
      setPct(97); setStepMsg("✅ Building interactive dashboard...");
      await new Promise(r=>setTimeout(r,300));
      setDashboard({...parsed, narrative, generatedAt:new Date().toLocaleString(), _totalRows:parsedFile?.totalRows??parsedFile?.pages??"N/A"});
      setActiveTab("overview");
      setScreen("dashboard");
    } catch(err) {
      setError(err.message??"Generation failed. Please check your API key and try again.");
      setScreen("input");
    }
  };

  const doExport = async (type) => {
    setExporting(type);
    try {
      if (type==="xlsx") exportToExcel(dashboard, parsedFile);
      else if (type==="pdf") exportToPDF(dashboard);
      else if (type==="pptx") await exportToPPTX(dashboard);
    } catch(err) {
      alert(`Export failed: ${err.message}`);
    } finally {
      setTimeout(()=>setExporting(null),2200);
    }
  };

  const reset = () => {
    setScreen("input"); setDashboard(null); setParsedFile(null);
    setRawText(""); setDept(null); setError(null); setPct(0);
  };

  return (
    <>
      <style>{STYLE}</style>
      <div style={{minHeight:"100vh"}}>
        {/* Header */}
        <div style={{height:60,borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 24px",position:"sticky",top:0,zIndex:200,background:`${T.bg}EE`,backdropFilter:"blur(12px)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:34,height:34,borderRadius:9,background:`linear-gradient(135deg,${T.accent},${T.accent2})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>⚡</div>
            <div>
              <div style={{fontWeight:800,fontSize:15,letterSpacing:"-.01em"}}>NEXUS ERP</div>
              <div style={{fontSize:9,color:T.muted,letterSpacing:".08em",textTransform:"uppercase",marginTop:-1}}>Power BI × AI Intelligence</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span className="badge" style={{background:`${T.accent}12`,color:T.accent,border:`1px solid ${T.accent}33`}}>
              <span className="pulse-dot"/> RAG ACTIVE
            </span>
            <button className={`btn ${apiKey?"active":""}`} onClick={()=>setShowKey(v=>!v)} style={{fontSize:11.5,padding:"5px 12px"}}>
              🔑 {apiKey?"Key ✓":"API Key"}
            </button>
            {screen==="dashboard"&&(
              <button className="btn" onClick={reset} style={{fontSize:12,padding:"5px 12px"}}>← New</button>
            )}
          </div>
        </div>

        {/* API Key Panel */}
        {showKey&&(
          <div style={{background:T.card,borderBottom:`1px solid ${T.border}`,padding:"13px 24px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <div style={{fontSize:12,color:T.muted,flex:1,lineHeight:1.7,minWidth:200}}>
              <b style={{color:T.text}}>GitHub Pages / Self-hosted:</b> Enter your Anthropic API key. Stays in memory only — never stored or logged.{" "}
              <a href="https://console.anthropic.com" target="_blank" rel="noreferrer" style={{color:T.accent,textDecoration:"none"}}>Get key →</a>
              <span style={{marginLeft:8,color:T.warn,fontSize:11}}>⚠ In claude.ai artifacts, leave blank (auto-proxied)</span>
            </div>
            <input className="field" type="password" placeholder="sk-ant-api03-…" value={apiKey} onChange={e=>setApiKey(e.target.value)} style={{padding:"7px 12px",fontSize:12.5,width:280}}/>
            <button className="btn" onClick={()=>setApiKey("")} style={{fontSize:11.5,padding:"5px 10px"}}>Clear</button>
            <button className="btn active" onClick={()=>setShowKey(false)} style={{fontSize:11.5,padding:"5px 12px"}}>Done ✓</button>
          </div>
        )}

        {screen==="processing"&&<ProcessingView stepMsg={stepMsg} pct={pct}/>}
        {screen==="input"&&(
          <InputView rawText={rawText} setRawText={setRawText}
            parsedFile={parsedFile} setParsedFile={setParsedFile}
            dept={dept} setDept={setDept}
            dragOver={dragOver} setDragOver={setDragOver}
            fileRef={fileRef} onDrop={onDrop}
            onGenerate={generate} error={error} setError={setError}/>
        )}
        {screen==="dashboard"&&dashboard&&(
          <DashboardView dashboard={dashboard} parsedFile={parsedFile}
            activeTab={activeTab} setActiveTab={setActiveTab}
            doExport={doExport} exporting={exporting}/>
        )}
      </div>
    </>
  );
}

// ── Boot ──────────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);

// Hide splash once React has painted
requestAnimationFrame(()=>{
  setTimeout(()=>{
    const s=document.getElementById("splash");
    if(s){ s.classList.add("hide"); setTimeout(()=>s.remove(),450); }
  },300);
});
</script>

</body>
</html>
